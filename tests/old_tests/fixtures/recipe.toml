# Synthetic recipe owned by the tests — exercises the section-default merge through
# a real TOML parse, decoupled from src/recipe.toml (which may change at any time).

[gpu_apps]
depends_on = ["packages"]
features = ["BaseOne", "BaseTwo"]

[gpu_apps.extender]
target = "extender.desktop"
features = ["ExtraOne", "ExtraTwo"]

[gpu_apps.inheritor]
target = "inheritor.desktop"

[gpu_apps.overlap]
target = "overlap.desktop"
features = ["BaseTwo", "ExtraThree"]
