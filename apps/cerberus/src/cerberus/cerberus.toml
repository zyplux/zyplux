[justfile_baseline]
default_recipe_marker = "just --list"
required = [
    { recipe = "default" },
    { recipe = "install", alias = "i" },
    { recipe = "knip", alias = "k" },
    { recipe = "typecheck", alias = "tc" },
    { recipe = "lint", alias = "l" },
    { recipe = "test", alias = "t" },
    { recipe = "check", alias = "c" },
    { recipe = "push", alias = "p" },
    { recipe = "push-ready", alias = "pr" },
]
recommended = [
    { recipe = "upgrade", alias = "u" },
    { recipe = "upgrade-interactive", alias = "ui" },
    { recipe = "clean" },
]
check_pipeline = ["install", "knip", "typecheck", "lint", "test"]
wrapped_tools = ["ruff", "pyrefly", "pytest", "rumdl", "vulture", "cerberus", "eslint", "prettier", "knip", "tsc"]

[workflow_toolchain_only]
allowed_setup_actions = ["astral-sh/setup-uv", "oven-sh/setup-bun"]

[ci_check_sequence]
image = "ghcr.io/zyplux/ci"

[ci_check_sequence.required]
ts = [
    "bun install --frozen-lockfile",
    "bun run knip",
    "bun run typecheck",
    "bun run lint",
    "prettier --check",
    "bun run test",
]
python = [
    "uv sync --locked",
    "vulture",
    "rumdl check",
    "ruff check",
    "ruff format --check",
    "pyrefly check",
    "pytest",
]

# Only the repo carrying the pin source can act on a lagging pin; it switches this on in its overlay.
[tool_pins_latest]
off = true
