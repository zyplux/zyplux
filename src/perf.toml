# perf.toml — config for run_apps_conf.py. The [chromium] table holds features
# shared by all Chromium-derived apps on this box; each app's own `features` are
# appended to those. Each app is its own [<app>] table identified by a `desktop`
# key, optionally with local_state(+_flags) for Chromium Local State or
# argv_json(+argv) for Electron. (run_gpu_conf.py installs the egpu-prime boot
# service and reads no config here — its inputs are static assets in files/.)

# Shared by every Chromium-derived app on this box.
# VaapiOnNvidiaGPUs is mandatory: Chromium disables VA-API whenever an NVIDIA GPU
# is detected in PCI, regardless of which driver/renderer is actually in use.
[chromium]
features = [
    "VaapiOnNvidiaGPUs",
    "AcceleratedVideoDecodeLinuxGL",
    "AcceleratedVideoDecodeLinuxZeroCopyGL",
    "WaylandLinuxDrmSyncobj",
]

[brave]
desktop     = "/usr/share/applications/brave-browser.desktop"
local_state = ".config/BraveSoftware/Brave-Browser/Local State"

# brave://flags via Local State (id@option-index; @1 = Enabled).
local_state_flags = [
    # "enable-unsafe-webgpu@1",
]

# render-node-override is silently overridden by Chromium on Optimus.
switches = []

# Browser-only, on top of [chromium].features.
# AcceleratedVideoEncoder: outbound WebRTC video + MediaRecorder API.
# WebRTCPipeWireCapturer: Wayland-native screen capture for getDisplayMedia().
features = [
    "AcceleratedVideoEncoder",
    "WebRTCPipeWireCapturer",
]

[code_insiders]
desktop   = "/usr/share/applications/code-insiders.desktop"
argv_json = ".vscode-insiders/argv.json"

# render-node-override here hangs the GPU process at startup — Electron does
# not silently override it the way Brave's Chromium does on Optimus.
switches = []

# No app-specific features; only [chromium].features apply.

# argv.json keys go through VS Code's hardcoded allowlist; anything outside it
# is dropped. enable-features is auto-synthesized from [chromium].features +
# [code_insiders].features (the latter is empty for this app).
[code_insiders.argv]
"ozone-platform-hint"      = "auto"
"enable-gpu-rasterization" = true
"ignore-gpu-blocklist"     = true
