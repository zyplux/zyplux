# url_config.toml — vendor-bootstrapped CLI tools installed into $HOME by
# install_from_urls.py. Each [[install]] block: skip if `bin` is already
# on PATH (or in a known bootstrap dir like ~/.cargo/bin, ~/.bun/bin,
# ~/.local/bin, ~/.claude/local); else fetch `url` and pipe it into bash
# with optional `args`.
#
# Required:
#   name   short label used in logs
#   url    https URL of the installer script
#   bin    binary name to probe for idempotency
#
# Optional:
#   args   list of args appended after `bash -s --` (e.g. ["-y"] for non-interactive)

[[install]]
name = "bun"
url = "https://bun.sh/install"
bin = "bun"

[[install]]
name = "uv"
url = "https://astral.sh/uv/install.sh"
bin = "uv"

[[install]]
name = "claude"
url = "https://claude.ai/install.sh"
bin = "claude"

[[install]]
name = "rustup"
url = "https://sh.rustup.rs"
bin = "rustup"
args = ["-y"]

[[install]]
name = "cargo-binstall"
url = "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh"
bin = "cargo-binstall"
