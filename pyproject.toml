[project]
name = "zyp-cerberus"
version = "0"
description = "zyp-cerberus — virtual workspace root (cerberus governance CLI + @zyplux/eslint-config)"
requires-python = ">=3.14"

[tool.uv]
package = false

[tool.uv.workspace]
members = ["apps/cerberus"]

[tool.pytest.ini_options]
testpaths = ["tests/cerberus"]

[tool.vulture]
paths = ["apps/cerberus/src", "tests/cerberus"]
ignore_decorators = ["@app.command"]
ignore_names = ["pytestmark"]

[dependency-groups]
lint = [
    "ruff>=0.15.17",
    "rumdl>=0.2.16",
    "vulture>=2.16",
]
test = [
    "pytest>=9.1.0",
]
type = [
    "pyrefly>=1.1",
    "types-pyyaml>=6.0.12.20260518",
]
