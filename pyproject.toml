[project]
name = "totchef"
version = "0.1.0"
description = "Declarative, idempotent system configuration for Ubuntu/Kubuntu — hand it a recipe, it makes the machine comply."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
keywords = ["configuration", "idempotent", "ubuntu", "apt", "declarative", "provisioning"]
dependencies = [
    "loguru>=0.7",
    "pydantic>=2.13.4",
    "rich>=14",
    "toon-format>=0.9.0b1",
    "typer>=0.12",
]

[project.scripts]
totchef = "totchef.cli:main"

# Built-in cooks register through the same entry-point group third-party plugins use:
# `pip install`/`uv tool install --with` a package that adds to [project.entry-points."totchef.cooks"]
# and its sections become available with no change to totchef itself.
[project.entry-points."totchef.cooks"]
url = "totchef.cooks.url_cook:UrlCook"
cargo = "totchef.cooks.cargo_cook:CargoCook"
uv = "totchef.cooks.uv_cook:UvCook"
bun = "totchef.cooks.bun_cook:BunCook"
file = "totchef.cooks.file_cook:FileCook"
bash = "totchef.cooks.bash_cook:BashCook"
apt_repo = "totchef.cooks.apt_repo_root_cook:AptRepoCook"
apt_pkg = "totchef.cooks.apt_pkg_root_cook:AptPkgCook"
snap = "totchef.cooks.snap_root_cook:SnapCook"
desktop = "totchef.cooks.desktop_cook:DesktopCook"
chromium_flags = "totchef.cooks.chromium_flags_cook:ChromiumFlagsCook"
settings = "totchef.cooks.settings_cook:SettingsCook"

[dependency-groups]
dev = ["pytest>=8", "pytest-cov>=6", "tomli-w>=1.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/totchef"]

[tool.ruff]
line-length = 160

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "--cov --cov-report=term-missing"

[tool.coverage.run]
source = ["totchef"]
branch = true
omit = ["/tmp/*"]

[tool.coverage.report]
show_missing = true

[tool.pyright]
venvPath = "."
venv = ".venv"
extraPaths = ["src"]

exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/.*",
    ".venv",
    "reference_clones",
]

[tool.vulture]
paths = ["src"]
# Cooks are resolved by entry point / config-dir convention (totchef.registry), so
# vulture sees no static reference and reports every cook class as dead. They are the
# app's plugins, not dead code — ignore by suffix. Same for the pydantic plumbing it
# can't trace: `model_config` is read by the model metaclass, and @model_validator
# methods are invoked by the decorator, never called by name.
ignore_names = ["*Cook", "model_config"]
# Typer invokes command/callback functions through the decorator, never by name,
# so vulture reads them as dead — ignore by decorator, like the cooks above.
ignore_decorators = ["@model_validator", "@app.command", "@app.callback"]
