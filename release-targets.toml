# Published release targets for this repo. Read by both `cz release-bumped-targets`
# (to publish) and cerberus's release-bumps check (to enforce a version bump when the surface
# changes). A repo with no release-targets.toml publishes nothing and is skipped.

[[target]]
kind = "npm"
label = "@zyplux/eslint-config"
tag_prefix = "eslint-config-v"
version = { file = "packages/eslint-config/package.json", json = "version" }
surface = [
    "packages/eslint-config/package.json",
    "packages/eslint-config/README.md",
    "packages/eslint-config/src",
]

[[target]]
kind = "npm"
label = "@zyplux/tsconfig"
tag_prefix = "tsconfig-v"
version = { file = "packages/tsconfig/package.json", json = "version" }
surface = ["packages/tsconfig"]

[[target]]
kind = "npm"
label = "@zyplux/util"
tag_prefix = "util-v"
version = { file = "packages/util-ts/package.json", json = "version" }
surface = ["packages/util-ts/package.json", "packages/util-ts/README.md", "packages/util-ts/src"]

[[target]]
kind = "npm"
label = "@zyplux/tests-fixtures"
tag_prefix = "tests-fixtures-v"
version = { file = "tests/fixtures/package.json", json = "version" }
surface = ["tests/fixtures/package.json", "tests/fixtures/README.md", "tests/fixtures/src"]

[[target]]
kind = "npm"
label = "@zyplux/cz"
tag_prefix = "cz-v"
version = { file = "apps/cz/package.json", json = "version" }
surface = ["apps/cz/package.json", "apps/cz/README.md", "apps/cz/src"]

[[target]]
kind = "pypi"
label = "zyplux-cerberus"
tag_prefix = "cerberus-v"
version = { file = "apps/cerberus/pyproject.toml", regex = '^version = "([^"]+)"' }
surface = ["apps/cerberus/src", "apps/cerberus/pyproject.toml", "apps/cerberus/README.md"]

[[target]]
kind = "ghcr"
label = "ghcr.io/zyplux/ci"
tag_prefix = "ci-image-v"
version = { file = "containers/ci/Containerfile", regex = '^LABEL org\.opencontainers\.image\.version="([^"]+)"' }
surface = ["containers/ci"]

[[target]]
kind = "pypi"
label = "zyplux-util"
tag_prefix = "util-py-v"
version = { file = "packages/util_py/pyproject.toml", regex = '^version = "([^"]+)"' }
surface = ["packages/util_py/src", "packages/util_py/pyproject.toml", "packages/util_py/README.md"]

[[target]]
kind = "pypi"
label = "totchef"
tag_prefix = "totchef-v"
version = { file = "apps/totchef/pyproject.toml", regex = '^version = "([^"]+)"' }
surface = ["apps/totchef/src", "apps/totchef/pyproject.toml", "apps/totchef/README.md"]
