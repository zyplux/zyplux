name: bootstrap-npm

on:
  workflow_dispatch:
    inputs:
      label:
        description: npm target label to first-publish with a token (e.g. @zyplux/util)
        required: true
        type: string

jobs:
  bootstrap:
    name: bootstrap npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Authenticate to npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Bootstrap publish
        run: bun run cz bootstrap-npm-target "$LABEL"
        env:
          LABEL: ${{ inputs.label }}
