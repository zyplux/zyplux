name: release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve target kind
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      kind: ${{ steps.kind.outputs.kind }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - id: kind
        run: echo "kind=$(bun run cz tag-kind "$GITHUB_REF_NAME" | tail -n1)" >> "$GITHUB_OUTPUT"

  npm:
    name: publish to npm
    needs: resolve
    if: needs.resolve.outputs.kind == 'npm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run cz publish "$GITHUB_REF_NAME"

  pypi:
    name: publish to PyPI
    needs: resolve
    if: needs.resolve.outputs.kind == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run cz publish "$GITHUB_REF_NAME"

  ghcr:
    name: publish CI image to GHCR
    needs: resolve
    if: needs.resolve.outputs.kind == 'ghcr'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run cz publish "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
