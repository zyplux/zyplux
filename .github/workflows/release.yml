name: release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  npm:
    name: publish to npm
    if: startsWith(github.event.release.tag_name, 'eslint-config-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Assert release tag matches version
        run: bun run cz assert-tag "$GITHUB_REF_NAME"
      - name: Authenticate to npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        working-directory: packages/eslint-config
        run: |
          bun pm pack
          npm publish ./*.tgz --access public

  npm-tsconfig:
    name: publish tsconfig to npm
    if: startsWith(github.event.release.tag_name, 'tsconfig-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Assert release tag matches version
        run: bun run cz assert-tag "$GITHUB_REF_NAME"
      - name: Authenticate to npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        working-directory: packages/tsconfig
        run: |
          bun pm pack
          npm publish ./*.tgz --access public

  pypi:
    name: publish to PyPI
    if: startsWith(github.event.release.tag_name, 'cerberus-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Assert release tag matches version
        run: bun run cz assert-tag "$GITHUB_REF_NAME"
      - name: Build
        run: uv build --package zyplux-cerberus
      - name: Publish
        run: uv publish

  ghcr:
    name: publish CI image to GHCR
    if: startsWith(github.event.release.tag_name, 'ci-image-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Assert release tag matches version
        run: bun run cz assert-tag "$GITHUB_REF_NAME"
      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        run: |
          version="${GITHUB_REF_NAME#ci-image-v}"
          podman build -t "ghcr.io/zyplux/ci:${version}" -t ghcr.io/zyplux/ci:latest containers/ci
          podman push "ghcr.io/zyplux/ci:${version}"
          podman push ghcr.io/zyplux/ci:latest
